services:
  actual_server:
    image: docker.io/actualbudget/actual-server:latest
    container_name: actual_server
    ports:
      - "5006"
    networks:
      proxy:
    env_file:
      - stack.env
    volumes:
      - actual-storage:/data
    healthcheck:
      # Enable health check for the instance
      test: ['CMD-SHELL', 'node src/scripts/health-check.js']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    
  actual-auto-sync:
      image: seriouslag/actual-auto-sync:latest
      container_name: actual-auto-sync
      restart: unless-stopped
      networks:
        proxy:
      env_file:
        - stack.env
      environment:
      # Override the server URL to use internal Docker networking
      # This only applies to actual-auto-sync, not other services
        ACTUAL_SERVER_URL: http://actual_server:5006
  # ── Actual Budget API Bridge ──────────────────────────────────────────────
  # Exposes @actual-app/api as a real REST API for n8n to consume.
  # The sync server has no budget data API — this bridge provides it.
  # Internal only — no Traefik labels, no external exposure.
  actual-bridge:
    build:
      context: ./actual-bridge
      dockerfile: Dockerfile
    container_name: actual-bridge
    restart: unless-stopped
    depends_on:               # ← ADD THIS
      actual_server:          # ← ADD THIS
        condition: service_healthy  # ← ADD THIS — waits for actual_server healthcheck to pass
    networks:
      proxy:
    environment:
      ACTUAL_SERVER_URL: http://actual_server:5006
      ACTUAL_PASSWORD: ${ACTUAL_SERVER_PASSWORD}
      ACTUAL_BUDGET_SYNC_ID: ${ACTUAL_BUDGET_SYNC_IDS}
      BRIDGE_API_KEY: ${BRIDGE_API_KEY}
    # Port 3788 is internal only — no external exposure needed
    # n8n reaches it at: http://actual-bridge:3788
    # (or by IP if hostname doesn't resolve across networks)
networks:
  proxy:
    external: true

volumes:
  actual-storage:
    external: true
    name: actual_budget_actual-storage
